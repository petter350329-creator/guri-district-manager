<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>구역 관리 · 체험판</title>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#222536;--bd:#2e3147;--ac:#6c8fff;--ac2:#a78bfa;--tx:#e8eaf6;--mu:#7b82a8;--dg:#f87171;--ok:#4ade80;--mn:#f6a935;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.hdr h1{font-size:.92rem;font-weight:600}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.demo-badge{background:rgba(246,169,53,.2);color:var(--mn);border:1px solid rgba(246,169,53,.3);border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:700}
.role-tag{font-size:.72rem;color:var(--mu)}

/* 탭 */
.main-body{flex:1;overflow-y:auto;min-height:0}
.tab-pane{display:none}.tab-pane.active{display:block}
.tab-bar{display:flex;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;border:none;background:transparent;color:var(--mu);font-family:inherit;font-size:.58rem;cursor:pointer;border-top:2px solid transparent}
.tab-btn.active{color:var(--ac);border-top-color:var(--ac)}
.tab-icon{font-size:1.1rem;line-height:1}.tab-label{font-weight:600}

/* 로그인 */
#screen-login{height:100vh;align-items:center;justify-content:center;background:var(--bg);overflow-y:auto}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:36px 28px;text-align:center;width:320px;max-width:90vw;margin:20px}
.login-box h2{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.login-box p{color:var(--mu);font-size:.8rem;margin-bottom:24px;line-height:1.7}
.role-select-row{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.role-opt{padding:11px 16px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:.83rem;text-align:left;background:var(--sf2);color:var(--tx);transition:all .18s;display:flex;align-items:center;gap:10px}
.role-opt:hover{border-color:var(--ac);background:rgba(108,143,255,.08)}
.role-opt.selected{border-color:var(--ac);background:rgba(108,143,255,.12);color:var(--ac);font-weight:700}
.role-icon{font-size:1.2rem;width:28px;text-align:center}
.role-desc{font-size:.72rem;color:var(--mu);display:block;margin-top:2px;font-weight:400}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--mu)}
.btn-sm{padding:5px 10px;font-size:.75rem;border-radius:6px;border:none;cursor:pointer}

/* 신앙관리 */
.faith-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--sf);flex-wrap:wrap;position:sticky;top:0;z-index:5}
.faith-title{font-size:.9rem;font-weight:600;flex:1}
.week-badge{font-size:.72rem;color:var(--mu);background:var(--sf2);padding:4px 10px;border-radius:5px;border:.5px solid var(--bd)}
.table-wrap{overflow-x:auto}
.faith-table{width:100%;border-collapse:collapse;font-size:.78rem}
.faith-table th{font-size:.65rem;font-weight:700;padding:5px 4px;border-bottom:.5px solid var(--bd);text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap;background:var(--sf);color:var(--mu)}
.faith-table th.sh{background:#1a2235;color:#85b7eb}
.faith-row{border-bottom:.5px solid var(--bd)}.faith-row:hover{background:rgba(108,143,255,.03)}
.col-name{padding:6px 4px 6px 10px;white-space:nowrap;cursor:pointer;min-width:72px}
.mname{font-weight:600;font-size:.82rem;color:var(--tx);display:block}
.mname:hover{color:var(--ac);text-decoration:underline}
.sp-badge{display:block;border-radius:3px;padding:1px 5px;font-size:.56rem;margin-top:1px;white-space:nowrap;border:0.5px solid}
.stamp-mini{display:block;font-size:.54rem;border-radius:3px;padding:1px 5px;margin-top:2px;white-space:nowrap}
.sm-done{background:rgba(248,113,113,.15);color:#f87171;border:.5px solid rgba(248,113,113,.4)}
.sm-empty{background:rgba(120,120,140,.1);color:rgba(120,120,140,.4);border:.5px solid rgba(120,120,140,.2)}
.wc{text-align:center;padding:5px 2px;cursor:pointer;min-width:36px}
.wc:hover{background:rgba(108,143,255,.08)}
.tags-td{padding:3px 5px;min-width:90px;cursor:pointer}.tags-td:hover{background:rgba(108,143,255,.06)}
.badge{display:inline-block;border-radius:4px;padding:1px 5px;font-size:.65rem;margin:1px}
.badge-edu{background:rgba(74,222,128,.15);color:var(--ok);border:1px solid rgba(74,222,128,.3)}
.badge-svc{background:rgba(246,169,53,.15);color:var(--mn);border:1px solid rgba(246,169,53,.3)}
.badge-add{color:rgba(255,255,255,.2);font-size:.8rem;display:block;text-align:center}
.chk-td{text-align:center;padding:6px 2px;width:30px;cursor:pointer}.chk-td:hover{background:rgba(108,143,255,.06)}
.chk-on{color:var(--ac);font-weight:700}.chk-m{color:var(--mn)!important}
.dot{color:rgba(255,255,255,.15);font-size:.9rem}
.res-td{text-align:center;padding:3px 4px;white-space:nowrap}
.rbtn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:3px 5px;font-size:1.1rem;line-height:1;cursor:pointer;opacity:.3;margin:1px}
.rbtn:hover{opacity:.7}.rbtn.ron{opacity:1}
.goal-td{padding:3px 6px;min-width:120px}
.goal-inp{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--tx);font-family:inherit;font-size:.75rem;padding:3px 2px;outline:none}
.goal-inp:focus{border-bottom-color:var(--ac)}
.goal-inp::placeholder{color:rgba(255,255,255,.2)}
.advisor-inp{color:#a78bfa!important}.advisor-inp::placeholder{color:rgba(167,139,250,.3)!important}
.prev-td{padding:3px 6px;min-width:100px;font-size:.72rem;color:var(--mu)}
.sep{border-right:1px solid rgba(255,255,255,.07)!important}
.hint{padding:5px 14px;font-size:.67rem;color:var(--mu);background:var(--sf);border-top:.5px solid var(--bd)}

/* 도장 */
.faith-stamp{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:58px;border-radius:8px;border:2.5px solid;flex-shrink:0;padding:3px;user-select:none;transition:all .2s;cursor:pointer}
.stamp-done{border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171;transform:rotate(-5deg);cursor:default}
.stamp-done .si{font-size:.9rem;line-height:1}.stamp-done .sn{font-size:.6rem;font-weight:900;letter-spacing:-.02em;margin-top:1px}
.stamp-done .sr{font-size:.48rem;color:rgba(248,113,113,.75);letter-spacing:.04em}.stamp-done .sd{font-size:.44rem;color:rgba(248,113,113,.6);margin-top:1px}
.stamp-empty{border-color:rgba(120,120,140,.25);color:rgba(120,120,140,.3)}.stamp-empty:hover{border-color:rgba(248,113,113,.45);color:rgba(248,113,113,.45);background:rgba(248,113,113,.04)}
.stamp-empty .si{font-size:.95rem;line-height:1}.stamp-empty .sr{font-size:.5rem;margin-top:2px}

/* 팝업 */
.pop-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-end;justify-content:center}
.pop-bg.show{display:flex}
.pop{background:var(--sf);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.pop-title{font-size:.78rem;font-weight:700;color:var(--mu);margin-bottom:10px;text-align:center}
.pop-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pop-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-family:inherit;font-size:.82rem;color:var(--tx);cursor:pointer;min-width:80px;text-align:center}
.pop-btn:hover{border-color:var(--ac);background:rgba(108,143,255,.1)}
.pop-btn.clear{color:var(--dg);border-color:rgba(248,113,113,.3)}
.pop-btn.absent{color:var(--dg);background:rgba(248,113,113,.08)}
.pop-btn.reset{color:var(--mu);font-size:.75rem}
.pop-check-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:12px}
.pop-check-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sf2);border-radius:7px;cursor:pointer;border:1px solid transparent}
.pop-check-item.on{border-color:var(--ac);background:rgba(108,143,255,.1)}
.pop-check-icon{width:18px;height:18px;border:1.5px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.pop-check-item.on .pop-check-icon{background:var(--ac);border-color:var(--ac);color:#fff}
.pop-close{display:block;width:100%;padding:9px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--mu);font-family:inherit;font-size:.8rem;cursor:pointer;margin-top:8px}

/* 인수인계서 */
#screen-profile{overflow:hidden}
.pf-hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pf-body{flex:1;overflow-y:auto;padding:16px;max-width:700px;width:100%;margin:0 auto}
.pf-section{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:14px}
.pf-st{font-size:.75rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.pf-grid{grid-template-columns:1fr}}
.pf-field{display:flex;flex-direction:column;gap:4px}.pf-field.full{grid-column:1/-1}
.pf-label{font-size:.7rem;color:var(--mu)}
.pf-input{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;color:var(--tx);font-family:inherit;font-size:.83rem;outline:none;width:100%}
.pf-input:focus{border-color:var(--ac)}
.pf-textarea{resize:vertical;min-height:58px}
.spirit-row{display:flex;gap:14px;align-items:flex-start}
.photo-box{width:80px;height:80px;border-radius:10px;border:1.5px dashed var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--mu);flex-direction:column;text-align:center;flex-shrink:0;font-size:.7rem;background-size:cover;background-position:center;cursor:pointer}
.spirit-btns{display:flex;flex-wrap:wrap;gap:6px}
.sp-btn{border-radius:6px;padding:5px 11px;font-size:.78rem;border:.5px solid;cursor:pointer;opacity:.3;font-weight:500;transition:all .15s}
.sp-btn.on{opacity:1;font-weight:700}
.level-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.lv-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 12px;font-size:.78rem;color:var(--mu);cursor:pointer;transition:all .15s}
.lv-btn.on{font-weight:700}
.lv-on-g{background:rgba(74,222,128,.15)!important;color:var(--ok)!important;border-color:var(--ok)!important}
.lv-on-o{background:rgba(246,169,53,.15)!important;color:var(--mn)!important;border-color:var(--mn)!important}
.lv-on-r{background:rgba(248,113,113,.15)!important;color:var(--dg)!important;border-color:var(--dg)!important}
.lv-on-a{background:rgba(108,143,255,.15)!important;color:var(--ac)!important;border-color:var(--ac)!important}
.save-bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--bd);padding:10px 16px;display:flex;gap:8px}
.save-bar button{flex:1;padding:11px;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer}
.save-bar .save-btn{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff}
.save-bar .back-btn{background:var(--sf2);color:var(--mu)}
.rel-role-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.rel-label{font-size:.72rem;font-weight:700;color:var(--ac2);width:40px;flex-shrink:0;padding-top:8px;text-align:right}
.rel-fields{display:flex;flex:1;gap:5px;flex-wrap:wrap}
.rel-inp{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 7px;color:var(--tx);font-family:inherit;font-size:.75rem;outline:none;flex:1;min-width:60px}
.rel-inp:focus{border-color:var(--ac)}
/* 스탬프 (상세카드) */
.stamp-card{display:flex;flex-direction:column;align-items:center;justify-content:center;width:64px;height:68px;border-radius:8px;border:2.5px solid #f87171;background:rgba(248,113,113,.07);color:#f87171;transform:rotate(-5deg);padding:4px;flex-shrink:0}
.stamp-card .si{font-size:.95rem}.stamp-card .sn{font-size:.62rem;font-weight:900;margin-top:1px}
.stamp-card .sr{font-size:.5rem;color:rgba(248,113,113,.75);letter-spacing:.04em}.stamp-card .sd{font-size:.46rem;color:rgba(248,113,113,.6);margin-top:1px}
/* 빈 상태 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;color:var(--mu);text-align:center;padding:20px;font-size:.85rem;line-height:1.9}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<!-- ① 로그인 -->
<div class="screen active" id="screen-login">
<div style="flex:1;display:flex;align-items:center;justify-content:center">
<div class="login-box">
  <div style="font-size:2.5rem;margin-bottom:14px">⛪</div>
  <h2>구역 관리</h2>
  <p>구리 청년회 구역 관리 시스템<br>아래 역할을 선택하고 체험해보세요</p>
  <div class="role-select-row">
    <div class="role-opt selected" onclick="selectRole(this,'leader')" data-role="leader">
      <span class="role-icon">👤</span>
      <div><span>구역장</span><span class="role-desc">구역원 관리, 예배/헌금/목표 기록</span></div>
    </div>
    <div class="role-opt" onclick="selectRole(this,'region')" data-role="region">
      <span class="role-icon">👑</span>
      <div><span>임원 (고현정)</span><span class="role-desc">임원 조언 + 확인 도장, 전체 열람</span></div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="enterDemo()">체험 시작 →</button>
  <p style="font-size:.65rem;color:var(--mu);margin-top:10px">실제 Firebase 연결 없이 샘플 데이터로 체험합니다</p>
</div>
</div>
</div>

<!-- ② 메인 -->
<div class="screen" id="screen-main">
  <div class="hdr">
    <div class="logo">⛪</div>
    <h1>구역 관리</h1>
    <div class="hdr-right">
      <span class="demo-badge">체험판</span>
      <span class="role-tag" id="role-label"></span>
    </div>
  </div>
  <div class="main-body" id="main-body">
    <div class="tab-pane active" id="tab-faith"></div>
    <div class="tab-pane" id="tab-evang"><div class="empty-state"><div style="font-size:2.5rem">🌱</div><p>전도 현황<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-visit"><div class="empty-state"><div style="font-size:2.5rem">🫂</div><p>심방 현황<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-stats"><div class="empty-state"><div style="font-size:2.5rem">📊</div><p>통계<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-settings">
      <div style="padding:20px;max-width:480px;margin:0 auto">
        <div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px">
          <div style="padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center"><span>🔑</span><span style="flex:1;font-size:.88rem">멤버 · 승인 관리</span><span style="color:var(--mu)">›</span></div>
          <div style="padding:14px 16px;display:flex;gap:10px;align-items:center"><span>📦</span><span style="flex:1;font-size:.88rem">구역원 이관 승인</span><span style="color:var(--mu)">›</span></div>
        </div>
        <div style="text-align:center;color:var(--mu);font-size:.7rem;padding:8px">구역 관리 v3.2 · 체험판</div>
        <button onclick="goLogin()" style="display:block;width:100%;padding:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-family:inherit;cursor:pointer;font-size:.83rem">← 역할 바꾸기</button>
      </div>
    </div>
  </div>
  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('faith')"><span class="tab-icon">📋</span><span class="tab-label">구역 신앙</span></button>
    <button class="tab-btn" onclick="switchTab('evang')"><span class="tab-icon">🌱</span><span class="tab-label">전도</span></button>
    <button class="tab-btn" onclick="switchTab('visit')"><span class="tab-icon">🫂</span><span class="tab-label">심방</span></button>
    <button class="tab-btn" onclick="switchTab('stats')"><span class="tab-icon">📊</span><span class="tab-label">통계</span></button>
    <button class="tab-btn" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span><span class="tab-label">설정</span></button>
  </nav>
</div>

<!-- ③ 상세카드 -->
<div class="screen" id="screen-profile">
  <div class="pf-hdr">
    <button class="btn btn-ghost btn-sm" onclick="closeProfile()" style="padding:5px 10px;font-size:.75rem;border-radius:6px">← 돌아가기</button>
    <span id="pf-name-disp" style="font-size:.95rem;font-weight:600;flex:1;text-align:center"></span>
    <button class="btn btn-sm" style="background:var(--ac);color:#fff" onclick="saveProfile()">저장</button>
  </div>
  <div class="pf-body" id="pf-body"></div>
</div>

<!-- 팝업 -->
<div class="pop-bg" id="pop-worship">
  <div class="pop">
    <div class="pop-title" id="pop-w-title">예배 기록</div>
    <div class="pop-btns">
      <button class="pop-btn" onclick="setWorship('present')">⛪ 현장</button>
      <button class="pop-btn" onclick="setWorship('zoom')">💻 줌</button>
      <button class="pop-btn" onclick="setWorship('excuse')">📋 사정</button>
      <button class="pop-btn absent" onclick="setWorship('absent')">✗ 미출석</button>
      <button class="pop-btn reset" onclick="setWorship(null)">↩ 초기화</button>
    </div>
    <button class="pop-close" onclick="closePop('pop-worship')">닫기</button>
  </div>
</div>

<div class="pop-bg" id="pop-tags">
  <div class="pop">
    <div class="pop-title" id="pop-t-title">선택</div>
    <div class="pop-check-list" id="pop-t-list"></div>
    <button class="pop-close" onclick="closePop('pop-tags')">완료</button>
  </div>
</div>

<script>
// ── 상태 ──
let role = 'leader';
let regionStamped = false;

const SP = {
  fly:  {label:'🦋 날라다녀', bg:'rgba(167,139,250,.18)', co:'#a78bfa', bd:'rgba(167,139,250,.5)'},
  run:  {label:'🏃 뛰고있어', bg:'rgba(108,143,255,.18)', co:'#6c8fff', bd:'rgba(108,143,255,.5)'},
  walk: {label:'🚶 걷고있어', bg:'rgba(74,222,128,.18)',  co:'#4ade80', bd:'rgba(74,222,128,.5)'},

// ── 이벤트 핸들러 ──
function doStamp() {
  if (!confirm('고현정 임원으로 이번 주 신앙관리를 확인하시겠어요?')) return;
  regionStamped = true; renderFaith();
}
function stampMember(mid) {
  const m = MEMBERS.find(x=>x.mid===mid); if (!m||m.stampDone) return;
  if (!confirm(m.name+'의 인수인계서를 확인했나요?')) return;
  m.stampDone = true; renderFaith();
}
function toggleChk(mid, field) {
  const m = MEMBERS.find(x=>x.mid===mid); if (!m) return;
  m[field] = !m[field]; renderFaith();
}
function toggleResult(mid, r) {
  const m = MEMBERS.find(x=>x.mid===mid); if (!m) return;
  m.prevResult = m.prevResult===r ? null : r; renderFaith();
}
function setGoal(mid, val, type) {
  const m = MEMBERS.find(x=>x.mid===mid); if (!m) return;
  if (type==='goal') m.goal=val; else m.leaderNote=val;
}

function openWorshipPop(mid, wtype) {
  _wpCtx = {mid,wtype};
  document.getElementById('pop-w-title').textContent = (wtype==='samil'?'삼일':'주일') + ' 예배 기록';
  document.getElementById('pop-worship').classList.add('show');
}
function setWorship(val) {
  const m = MEMBERS.find(x=>x.mid===_wpCtx.mid); if (!m) return;
  m.worship[_wpCtx.wtype] = val;
  closePop('pop-worship'); renderFaith();
}

// 교육/봉사 팝업
let _tpCtx = {};
function openTagsPop(mid, dtype) {
  _tpCtx = {mid, dtype};
  const m = MEMBERS.find(x=>x.mid===mid); if (!m) return;
  const list = dtype==='edu' ? GLOBAL_EDU : GLOBAL_SVC;
  const current = dtype==='edu' ? m.edu : m.svc;
  document.getElementById('pop-t-title').textContent = dtype==='edu'?'받은 교육 선택':'모임·봉사 선택';
  document.getElementById('pop-t-list').innerHTML = list.map(item=>{
    const on = current.includes(item);
    return '<div class="pop-check-item'+(on?' on':'')+'" onclick="toggleTag(this,\''+item+'\')">'
      +'<div class="pop-check-icon">'+(on?'✓':'')+'</div>'
      +'<span style="font-size:.83rem">'+item+'</span></div>';
  }).join('');
  document.getElementById('pop-tags').classList.add('show');
}
function toggleTag(el, item) {
  const m = MEMBERS.find(x=>x.mid===_tpCtx.mid); if (!m) return;
  const arr = _tpCtx.dtype==='edu' ? m.edu : m.svc;
  const idx = arr.indexOf(item);
  if (idx>=0) arr.splice(idx,1); else arr.push(item);
  el.classList.toggle('on');
  el.querySelector('.pop-check-icon').textContent = arr.includes(item)?'✓':'';
}

function closePop(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.pop-bg').forEach(bg => bg.addEventListener('click', e=>{ if(e.target===bg) bg.classList.remove('show'); }));

    // 이전 담당자
    +'<div class="pf-section"><div class="pf-st">👤 이전 담당자</div><div class="pf-grid">'
    +pfInput('이름','prevLeader',d.prevLeader,'pf-pl')
    +pfInput('연락처','prevLeaderContact',d.prevLeaderContact,'pf-plc')
    +'</div></div>'
    +'<div style="height:20px"></div>';

  showScreen('profile');
}

function pfInput(label, field, val, id) {
  return '<div class="pf-field"><div class="pf-label">'+label+'</div>'
    +'<input class="pf-input" id="'+id+'" value="'+escHtml(val||'')+'" placeholder="'+label+'"></div>';
}
function pfTextarea(label, field, val, id) {
  return '<div class="pf-field full"><div class="pf-label">'+label+'</div>'
    +'<textarea class="pf-input pf-textarea" id="'+id+'">'+escHtml(val||'')+'</textarea></div>';
}

function setPfSpirit(key) {
  const m = MEMBERS.find(x=>x.mid===_curMid); if (!m) return;
  m.spiritLevel = key;
  document.querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('on'));
  event.currentTarget.classList.add('on');
  const sp = SP[key];
  const disp = document.getElementById('pf-sp-disp');
  if (disp) { disp.textContent=sp.label; disp.style.cssText='border-radius:6px;padding:6px 14px;font-size:.82rem;font-weight:600;text-align:center;margin-bottom:8px;background:'+sp.bg+';color:'+sp.co+';border:.5px solid '+sp.bd; }
}

function setPfLevel(btn, field, val, cls) {
  const parent = btn.closest('.level-row');
  parent.querySelectorAll('.lv-btn').forEach(b=>{ b.classList.remove('on','lv-on-g','lv-on-o','lv-on-r','lv-on-a'); });
  btn.classList.add('on','lv-on-'+cls);
  const d = DETAIL[_curMid]; if(d) d[field]=val;
}

function addFriend() {
  const d = DETAIL[_curMid]; if(!d) return;
  if (!d.relFriends) d.relFriends=[];
  d.relFriends.push({이름:'',연락처:'',소속:'',관계:''});
  openProfile(_curMid);
}

function saveProfile() {
  const m = MEMBERS.find(x=>x.mid===_curMid);
  const d = DETAIL[_curMid]||{};
  ['birth','phone','workplace','mbti'].forEach(f => {
    const el = document.getElementById('pf-'+f);
    if (el) d[f]=el.value;
  });
  ['pf-wnote','pf-caution','pf-prayer2','pf-vt','pf-pl','pf-plc'].forEach(id=>{
    const el = document.getElementById(id); if(el) d[id.replace('pf-','')]=el.value;
  });
  if (m) {
    const newGoal = document.querySelector('.goal-inp');
  }
  alert('✅ 저장됐어요!\n(체험판은 새로고침 시 초기화됩니다)');
  showScreen('main'); renderFaith();
}
function closeProfile() { showScreen('main'); }

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
