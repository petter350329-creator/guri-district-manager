<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>구역 관리 · 체험판</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3147;--accent:#6c8fff;--accent2:#a78bfa;--text:#e8eaf6;--muted:#7b82a8;--danger:#f87171;--success:#4ade80;--monthly:#f6a935;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
#screen-main{height:100vh;max-height:100vh;overflow:hidden}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.hdr h1{font-size:.92rem;font-weight:600}
.hdr-right{margin-left:auto;font-size:.75rem;color:var(--muted)}
.demo-badge{background:rgba(246,169,53,.2);color:var(--monthly);border:1px solid rgba(246,169,53,.3);border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:700}

/* 탭 */
.main-layout{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.main-content{flex:1;overflow-y:auto;min-height:0}
.tab-pane{display:none;flex-direction:column;height:100%}.tab-pane.active{display:flex}
.tab-bar{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.58rem;cursor:pointer;border-top:2px solid transparent}
.tab-btn.active{color:var(--accent);border-top-color:var(--accent)}
.tab-icon{font-size:1.1rem;line-height:1}.tab-label{font-weight:600}

/* 로그인 */
#screen-login{align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:36px 28px;text-align:center;width:320px;max-width:90vw}
.login-box h2{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.login-box p{color:var(--muted);font-size:.8rem;margin-bottom:24px;line-height:1.7}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%}
.btn-demo{background:rgba(246,169,53,.15);color:var(--monthly);border:1px solid rgba(246,169,53,.3);width:100%;margin-top:10px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-sm{padding:5px 10px;font-size:.75rem;border-radius:6px;background:rgba(108,143,255,.15);color:var(--accent);border:none;cursor:pointer}

/* 신앙관리 테이블 */
.faith-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.faith-title{font-size:.9rem;font-weight:600;flex:1}
.week-badge{font-size:.72rem;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:5px;border:.5px solid var(--border)}
.table-scroll{overflow-x:auto;flex:1}
.faith-table{width:100%;border-collapse:collapse;font-size:.78rem}
.faith-table th{font-size:.65rem;font-weight:700;padding:5px 4px;border-bottom:.5px solid var(--border);text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap;background:var(--surface);color:var(--muted)}
.faith-table th.s-h{background:#1a2235;color:#85b7eb}
.faith-row{border-bottom:.5px solid var(--border)}.faith-row:hover{background:rgba(108,143,255,.04)}
.col-name-td{padding:6px 4px 6px 10px;white-space:nowrap;cursor:pointer}
.member-name{font-weight:600;font-size:.82rem;color:var(--text);display:block}
.member-name:hover{color:var(--accent)}
.sp-badge{display:block;border-radius:3px;padding:1px 5px;font-size:.56rem;margin-top:1px;white-space:nowrap;border:0.5px solid}
.stamp-mini{display:block;font-size:.54rem;border-radius:3px;padding:1px 5px;margin-top:2px;white-space:nowrap}
.stamp-done-mini{background:rgba(248,113,113,.15);color:#f87171;border:0.5px solid rgba(248,113,113,.4)}
.stamp-empty-mini{background:rgba(120,120,140,.1);color:rgba(120,120,140,.35);border:0.5px solid rgba(120,120,140,.2)}
.wc{text-align:center;padding:4px 2px;font-size:.78rem;min-width:42px}
.chk{text-align:center;padding:6px 2px;width:30px}
.chk-on{color:var(--accent);font-weight:700}
.chk-m-on{color:var(--monthly)!important}
.res{text-align:center;padding:3px 4px;white-space:nowrap}
.r-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 5px;font-size:1.1rem;line-height:1;cursor:default;opacity:.35}
.r-on{opacity:1}
.goal-td{padding:4px 8px;min-width:140px;font-size:.72rem;color:var(--muted)}
.prev-goal{font-size:.72rem;color:var(--muted);padding:4px 6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table-hint{padding:5px 14px;font-size:.67rem;color:var(--muted);flex-shrink:0}
.chk-dot{color:rgba(255,255,255,.15);font-size:.9rem}
.sep-r{border-right:1px solid rgba(255,255,255,.07)!important}

/* 인수인계서(상세) */
#screen-profile{flex-direction:column;background:var(--bg)}
.profile-hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.profile-body{flex:1;overflow-y:auto;padding:16px;max-width:700px;width:100%;margin:0 auto}
.profile-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.profile-section-title{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.spirit-photo-row{display:flex;gap:14px;align-items:flex-start}
.photo-box{width:80px;height:80px;border-radius:10px;border:1.5px dashed var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;background-size:cover;background-position:center;font-size:1.3rem;color:var(--muted);flex-direction:column;text-align:center;flex-shrink:0}
.spirit-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.spirit-btn{border-radius:6px;padding:6px 12px;font-size:.78rem;border:.5px solid;font-weight:500;opacity:.35}
.spirit-btn.spirit-on{opacity:1;font-weight:700}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.pf-grid{grid-template-columns:1fr}}
.pf-field{display:flex;flex-direction:column;gap:4px}.pf-field.full{grid-column:1/-1}
.pf-label{font-size:.7rem;color:var(--muted)}
.pf-val{font-size:.83rem;padding:4px 2px;border-bottom:1px solid var(--border);color:var(--text);min-height:26px}
.pf-val.empty{color:var(--muted);font-style:italic;font-size:.75rem}
.level-group{display:flex;gap:5px;margin-top:2px;flex-wrap:wrap}
.level-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 12px;font-size:.78rem;color:var(--muted)}
.level-btn.level-on-green{background:rgba(74,222,128,.15);color:var(--success);border-color:var(--success);font-weight:700}
.level-btn.level-on-orange{background:rgba(246,169,53,.15);color:var(--monthly);border-color:var(--monthly);font-weight:700}
.level-btn.level-on-accent{background:rgba(108,143,255,.2);color:var(--accent);border-color:var(--accent);font-weight:700}
/* 도장 */
.stamp-box-full{display:flex;flex-direction:column;align-items:center;justify-content:center;width:68px;height:72px;border-radius:8px;border:2.5px solid #f87171;background:rgba(248,113,113,.07);color:#f87171;transform:rotate(-4deg);flex-shrink:0;padding:4px;user-select:none;font-size:.6rem}
.stamp-box-full .s-icon{font-size:1rem;line-height:1;margin-bottom:1px}
.stamp-box-full .s-name{font-weight:900;letter-spacing:-.02em;font-size:.66rem}
.stamp-box-full .s-role{font-size:.5rem;color:rgba(248,113,113,.75);letter-spacing:.04em}
.stamp-box-full .s-date{font-size:.46rem;color:rgba(248,113,113,.6);margin-top:1px}
/* 관계 */
.rel-role-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.rel-role-label{font-size:.72rem;font-weight:700;color:var(--accent2);width:40px;flex-shrink:0;padding-top:4px;text-align:right}
.rel-role-fields{display:flex;flex:1;gap:5px;flex-wrap:wrap}
.rel-val{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:.75rem;color:var(--text);flex:1;min-width:60px}
.rel-friend-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
/* 빈 상태 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--muted);text-align:center;padding:20px;font-size:.85rem;line-height:1.8}
.faith-stamp-box{display:flex;flex-direction:column;align-items:center;justify-content:center;width:56px;height:60px;border-radius:8px;border:2.5px solid;flex-shrink:0;padding:3px;user-select:none;transition:all .2s}
.faith-stamp-done{border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171;transform:rotate(-5deg);cursor:default}
.faith-stamp-done .fs-icon{font-size:.95rem;line-height:1}
.faith-stamp-done .fs-name{font-size:.62rem;font-weight:900;letter-spacing:-.02em;margin-top:1px}
.faith-stamp-done .fs-role{font-size:.5rem;color:rgba(248,113,113,.75);letter-spacing:.03em}
.faith-stamp-done .fs-date{font-size:.44rem;color:rgba(248,113,113,.6);margin-top:1px}
.faith-stamp-empty{border-color:rgba(120,120,140,.25);background:transparent;color:rgba(120,120,140,.3);cursor:pointer}
.faith-stamp-empty:hover{border-color:rgba(248,113,113,.45);color:rgba(248,113,113,.45);background:rgba(248,113,113,.04)}
.faith-stamp-empty .fs-icon{font-size:1rem;line-height:1}
.faith-stamp-empty .fs-role{font-size:.52rem;margin-top:2px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="screen active" id="screen-login">
  <div style="flex:1;display:flex;align-items:center;justify-content:center">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:14px">⛪</div>
    <h2>구역 관리</h2>
    <p>구리 청년회 구역 관리 시스템<br>회의 체험판입니다</p>
    <button class="btn btn-demo" onclick="enterDemo()">🔍 체험판으로 둘러보기</button>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <p style="font-size:.7rem;color:var(--muted);margin-bottom:10px">실제 서비스 로그인</p>
      <button class="btn btn-primary" style="opacity:.5;cursor:default">Google로 로그인</button>
      <p style="font-size:.65rem;color:var(--muted);margin-top:8px">체험판에서는 Google 로그인이 비활성화되어 있어요</p>
    </div>
  </div>
  </div>
</div>

<!-- 메인 -->
<div class="screen" id="screen-main">
  <div class="hdr">
    <div class="logo">⛪</div>
    <h1>구역 관리</h1>
    <div class="hdr-right"><span class="demo-badge">체험판</span> &nbsp;<span style="font-size:.72rem">고현정 임원</span></div>

  <div class="main-layout">
    <div class="main-content">
      <div class="tab-pane active" id="tab-faith">
        <div id="faith-content"></div>
      </div>
      <div class="tab-pane" id="tab-evang">

      </div>

      </div>
      <div class="tab-pane" id="tab-settings">
        <div style="padding:20px;max-width:480px;margin:0 auto">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)">
              <span>📌</span><span style="flex:1;font-size:.88rem">구역장 배정</span><span style="color:var(--muted)">›</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)">
              <span>🔑</span><span style="flex:1;font-size:.88rem">멤버 · 승인 관리</span><span style="color:var(--muted)">›</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px">
              <span>📦</span><span style="flex:1;font-size:.88rem">구역원 이관 승인</span><span style="color:var(--muted)">›</span>
            </div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px">
              <span>🗺</span><span style="flex:1;font-size:.88rem">지역 · 구역 관리</span><span style="color:var(--muted)">›</span>
            </div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;color:var(--danger)">
              <span>🚪</span><span style="flex:1;font-size:.88rem">로그아웃</span>
            </div>
          </div>
          <div style="text-align:center;color:var(--muted);font-size:.7rem;padding:12px">구역 관리 v3.2 · 체험판</div>
        </div>
      </div>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="faith" onclick="switchTab('faith')"><span class="tab-icon">📋</span><span class="tab-label">구역 신앙</span></button>
      <button class="tab-btn" data-tab="evang" onclick="switchTab('evang')"><span class="tab-icon">🌱</span><span class="tab-label">전도</span></button>
      <button class="tab-btn" data-tab="visit" onclick="switchTab('visit')"><span class="tab-icon">🫂</span><span class="tab-label">심방</span></button>
      <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')"><span class="tab-icon">📊</span><span class="tab-label">통계</span></button>
      <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span><span class="tab-label">설정</span></button>
    </nav>
  </div>
</div>

<!-- 인수인계서 -->
<div class="screen" id="screen-profile">
  <div class="profile-hdr">
    <button class="btn btn-ghost btn-sm" onclick="showScreen('main')">← 돌아가기</button>
    <span id="profile-name-disp" style="font-size:.95rem;font-weight:600;flex:1;text-align:center"></span>
    <button class="btn btn-sm" style="background:rgba(167,139,250,.2);color:#a78bfa">이관</button>
    <button class="btn btn-sm" style="background:var(--accent);color:#fff">저장</button>
  </div>
  <div class="profile-body" id="profile-body"></div>
</div>

<script>
// ── 샘플 데이터 (창조1구역) ──
const WEEK_LABEL = '2025년 19주차 (5/5~5/11)';
const MEMBERS = [
  { mid:'m1', name:'김은혜', spiritLevel:'fly',   stamp:true,  worship:{samil:'present',juil:'present'}, weekly:true, tithe:true, construction:true, prevResult:'○', goal:'말씀 묵상 매일', prevGoal:'큐티 3회', eduBadges:['제자훈련'], svcBadges:['찬양팀'] },
  { mid:'m2', name:'박소망', spiritLevel:'run',   stamp:true,  worship:{samil:'zoom',  juil:'present'}, weekly:true, tithe:false,construction:true, prevResult:'△', goal:'구역 모임 참석', prevGoal:'기도 10분', eduBadges:['성경통독'], svcBadges:[] },
  { mid:'m3', name:'이새벽', spiritLevel:'walk',  stamp:false, worship:{samil:'present',juil:'zoom'},   weekly:false,tithe:true, construction:false,prevResult:'✕', goal:'전도 대상자 기도', prevGoal:'전도 시도',  eduBadges:[], svcBadges:['봉사부'] },
  { mid:'m4', name:'최믿음', spiritLevel:'lay',   stamp:false, worship:{samil:null,    juil:'excuse'},  weekly:true, tithe:false,construction:false,prevResult:null, goal:'', prevGoal:'',        eduBadges:[], svcBadges:[] },
  { mid:'m5', name:'정사랑', spiritLevel:'sleep', stamp:false, worship:{samil:'absent',juil:null},      weekly:false,tithe:false,construction:false,prevResult:null, goal:'', prevGoal:'연락 닿기', eduBadges:[], svcBadges:[] },
];

const DETAIL = {
  m1:{ birth:'1999.03.15', phone:'010-1234-5678', workplace:'서울 마포구 디자인 회사', mbti:'ENFJ', spiritLevel:'fly', faithLevel:'상', worshipLevel:'상', faithType:'가족신앙', visitTime:'주일 예배 후 대면 가능', caution:'특이사항 없음', prayer:'직장 내 전도, 가족 구원', prevLeader:'오하나', prevLeaderContact:'010-9999-0000', stamp:{ name:'고현정', timestamp: new Date('2025-05-08').getTime() }, relData:{ friends:[{이름:'장기쁨',연락처:'010-2222-3333',소속:'창조청년회',관계:'소그룹 친구'}], roles:{ 인도자:{이름:'박인도',연락처:'010-7777-8888',소속:'창조구역',비고:'2023년 인도'}, 섬김이:{이름:'김섬김',연락처:'',소속:'',비고:''} } } },
  m3:{ birth:'2001.07.22', phone:'010-5678-1234', workplace:'남양주 간호학과 재학', mbti:'INFP', spiritLevel:'walk', faithLevel:'중', worshipLevel:'중', faithType:'홀신앙', visitTime:'목~토 저녁 카톡 가능', caution:'연락 조심스럽게 접근', prayer:'학업, 신앙 정착', prevLeader:'나은혜', prevLeaderContact:'010-6666-7777', stamp:null, relData:{ friends:[], roles:{} } },
};

function enterDemo() {
  showScreen('main');
  renderFaith();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id)?.classList.add('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  document.querySelector('.tab-btn[data-tab="' + tab + '"]')?.classList.add('active');
}

const SP = {
  fly:  {label:'🦋 날라다녀', bg:'rgba(167,139,250,.18)', color:'#a78bfa', border:'rgba(167,139,250,.5)'},
  run:  {label:'🏃 뛰고있어', bg:'rgba(108,143,255,.18)', color:'#6c8fff', border:'rgba(108,143,255,.5)'},
  walk: {label:'🚶 걷고있어', bg:'rgba(74,222,128,.18)',  color:'#4ade80', border:'rgba(74,222,128,.5)'},
  lay:  {label:'😪 누워있어', bg:'rgba(246,169,53,.18)',  color:'#f6a935', border:'rgba(246,169,53,.5)'},
  sleep:{label:'😴 자고있어', bg:'rgba(248,113,113,.18)', color:'#f87171', border:'rgba(248,113,113,.5)'},
};

function wCell(w) {
  if (!w) return '<span style="color:rgba(200,200,200,.2)">—</span>';
  if (w === 'absent') return '<span style="color:var(--danger);font-size:.82rem">✗</span>';
  const map = { present:{c:'var(--success)',s:'●'}, zoom:{c:'var(--accent)',s:'Z'}, excuse:{c:'var(--monthly)',s:'사'} };
  const cfg = map[w] || {c:'var(--muted)',s:'?'};
  return '<span style="color:' + cfg.c + ';font-size:.78rem">' + cfg.s + '</span>';
}

function renderFaith() {
  const el = document.getElementById('faith-content');
  const EMOJI = {'○':'✅','△':'🔸','✕':'❌'};
  let rows = MEMBERS.map(m => {
    const sp = SP[m.spiritLevel];
    const spBadge = sp ? '<span class="sp-badge" style="background:' + sp.bg + ';color:' + sp.color + ';border-color:' + sp.border + '">' + sp.label + '</span>' : '';
    const stampBadge = m.stamp
      ? '<span class="stamp-mini stamp-done-mini">✅ 고현정</span>'
      : '<span class="stamp-mini stamp-empty-mini" onclick="doStamp(\'' + m.mid + '\')" style="cursor:pointer">미확인</span>';
    const eduB = m.eduBadges.map(e => '<span style="display:inline-block;background:rgba(74,222,128,.15);color:var(--success);border:1px solid rgba(74,222,128,.3);border-radius:4px;padding:1px 5px;font-size:.65rem;margin:1px">' + e + '</span>').join('');
    const svcB = m.svcBadges.map(s => '<span style="display:inline-block;background:rgba(246,169,53,.15);color:var(--monthly);border:1px solid rgba(246,169,53,.3);border-radius:4px;padding:1px 5px;font-size:.65rem;margin:1px">' + s + '</span>').join('');
    const rBtns = ['○','△','✕'].map(r => '<button class="r-btn' + (m.prevResult===r?' r-on':'') + '">' + EMOJI[r] + '</button>').join('');
    return '<tr class="faith-row">'
      + '<td class="col-name-td" onclick="openProfile(\'' + m.mid + '\')">'
      + '<span class="member-name">' + m.name + '</span>' + spBadge + stampBadge + '</td>'
      + '<td class="wc">' + wCell(m.worship.samil) + '</td>'
      + '<td class="wc sep-r">' + wCell(m.worship.juil) + '</td>'
      + '<td style="padding:4px 6px;min-width:90px">' + (eduB || '<span style="color:rgba(255,255,255,.15);font-size:.8rem">+</span>') + '</td>'
      + '<td class="sep-r" style="padding:4px 6px;min-width:90px">' + (svcB || '<span style="color:rgba(255,255,255,.15);font-size:.8rem">+</span>') + '</td>'
      + '<td class="chk ' + (m.weekly?'chk-on':'') + '">' + (m.weekly?'✓':'<span class="chk-dot">·</span>') + '</td>'
      + '<td class="chk ' + (m.tithe?'chk-m-on':'') + '">' + (m.tithe?'✓':'<span class="chk-dot">·</span>') + '</td>'
      + '<td class="chk sep-r ' + (m.construction?'chk-m-on':'') + '">' + (m.construction?'✓':'<span class="chk-dot">·</span>') + '</td>'
      + '<td class="prev-goal">' + (m.prevGoal || '') + '</td>'
      + '<td class="res">' + rBtns + '</td>'
      + '<td class="goal-td"><div style="font-size:.78rem;color:var(--text)">' + (m.goal||'') + '</div></td>'
      + '</tr>';
  }).join('');

  el.innerHTML =
    '<div class="faith-topbar">'
    + '<div class="faith-title">창조 · 창조1구역</div>'
    + '<span class="week-badge">' + WEEK_LABEL + '</span>'
    + '</div>'
    + '<div class="table-scroll"><table class="faith-table"><thead>'
    + '<tr><th rowspan="2" style="text-align:left;padding-left:10px;min-width:72px">이름</th>'
    + '<th colspan="2" class="s-h">⛪ 예배</th>'
    + '<th>📖 교육</th><th>🤝 모임</th>'
    + '<th colspan="3" style="background:#251520;color:#c97ab5">💰 헌금</th>'
    + '<th colspan="3" style="background:#1e1a2a;color:#a78bfa">🎯 단계향상 목표</th></tr>'
    + '<tr><th class="s-h">삼일</th><th class="s-h" style="border-right:1px solid rgba(133,183,235,.2)">주일</th>'
    + '<th style="min-width:90px;text-align:left;padding-left:6px">받은 교육</th>'
    + '<th style="min-width:90px;text-align:left;padding-left:6px;border-right:1px solid rgba(255,255,255,.07)">모임(봉사)</th>'
    + '<th style="background:#1a1a26;width:30px">주정</th>'
    + '<th style="background:#1a1508;color:var(--monthly);width:30px">십일</th>'
    + '<th style="background:#1a1508;color:var(--monthly);width:30px;border-right:1px solid rgba(255,255,255,.07)">건축</th>'
    + '<th style="min-width:100px;text-align:left;padding-left:6px">지난주 목표</th>'
    + '<th style="width:90px">달성</th>'
    + '<th style="min-width:140px;text-align:left;padding-left:6px">이번주 목표</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>'
    + '<div class="table-hint"><span style="background:rgba(246,169,53,.15);color:var(--monthly);padding:1px 5px;border-radius:3px;font-size:.67rem">십일·건축</span> 월간 유지 &nbsp;|&nbsp; 이름 클릭 → 상세카드</div>';
}

let regionStamped = false;

function getStampHtml() {
  if (regionStamped) {
    const now = new Date();
    const ds = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');
    return '<div class="faith-stamp-box faith-stamp-done" title="고현정 임원 확인">'
      + '<div class="fs-icon">🌸</div>'
      + '<div class="fs-name">고현정</div>'
      + '<div class="fs-role">임원확인</div>'
      + '<div class="fs-date">' + ds + '</div>'
      + '</div>';
  }
  return '<div class="faith-stamp-box faith-stamp-empty" onclick="doRegionStamp()" title="확인 도장 찍기">'
    + '<div class="fs-icon">🔲</div>'
    + '<div class="fs-role">미확인</div>'
    + '</div>';
}

function doRegionStamp() {
  if (regionStamped) return;
  if (!confirm('고현정 임원으로 이번 주 신앙관리를 확인하시겠어요?')) return;
  regionStamped = true;
  renderFaith();
}

function doStamp(mid) {
  const m = MEMBERS.find(x => x.mid === mid);
  if (!m || m.stamp) return;
  if (!confirm('고현정 임원으로 확인 도장을 찍을까요?')) return;
  m.stamp = true;
  renderFaith();
}

function openProfile(mid) {
  const m = MEMBERS.find(x => x.mid === mid);
  if (!m) return;
  const d = DETAIL[mid] || {};
  document.getElementById('profile-name-disp').textContent = m.name;
  const sp = SP[m.spiritLevel] || {};

  // 도장
  let stampHtml = '';
  const stamp = d.stamp;
  if (stamp) {
    const dt = new Date(stamp.timestamp);
    const ds = dt.getFullYear() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');
    stampHtml = '<div class="stamp-box-full"><div class="s-icon">🌸</div><div class="s-name">' + stamp.name + '</div><div class="s-role">임원확인</div><div class="s-date">' + ds + '</div></div>';
  }

  // 관계
  const rel = d.relData || { friends:[], roles:{} };
  const friends = (rel.friends||[]).map(f =>
    '<div class="rel-friend-row">'
    + ['이름','연락처','소속','관계'].map(c => '<div class="rel-val">' + (f[c]||'<span style="color:var(--muted);font-size:.7rem">-</span>') + '</div>').join('')
    + '</div>'
  ).join('') || '<div style="color:var(--muted);font-size:.78rem;padding:4px 0">없음</div>';

  const ROLES = ['인도자','섬김이','교사','전도사','강사'];
  const rolesHtml = ROLES.map(role => {
    const rv = (rel.roles||{})[role] || {};
    return '<div class="rel-role-row"><div class="rel-role-label">' + role + '</div><div class="rel-role-fields">'
      + ['이름','연락처','소속','비고'].map(c => '<div class="rel-val">' + (rv[c]||'<span style="color:var(--muted);font-size:.7rem">-</span>') + '</div>').join('')
      + '</div></div>';
  }).join('');

  document.getElementById('profile-body').innerHTML =
    // 심령+사진
    '<div class="profile-section"><div style="display:flex;justify-content:space-between;align-items:flex-start">'
    + '<div class="profile-section-title">✨ 심령 단계</div>' + stampHtml + '</div>'
    + '<div class="spirit-photo-row">'
    + '<div class="photo-box" style="' + (d.photo ? 'background-image:url('+d.photo+');' : '') + '">' + (d.photo ? '' : '📷<div style="font-size:.6rem;margin-top:4px">사진 없음</div>') + '</div>'
    + '<div style="flex:1"><div style="' + (sp.bg ? 'background:'+sp.bg+';color:'+sp.color+';border:0.5px solid '+sp.border : 'display:none') + ';border-radius:6px;padding:6px 14px;font-size:.82rem;font-weight:600;margin-bottom:8px;text-align:center">' + (sp.label||'') + '</div>'
    + '<div class="spirit-btns">'
    + Object.entries(SP).map(([k,s]) => '<button class="spirit-btn' + (m.spiritLevel===k?' spirit-on':'') + '" style="background:' + s.bg + ';color:' + s.color + ';border-color:' + s.border + '">' + s.label + '</button>').join('')
    + '</div></div></div></div>'
    // 기본정보
    + '<div class="profile-section"><div class="profile-section-title">📋 기본 정보</div><div class="pf-grid">'
    + pf('생년월일', d.birth) + pf('고유번호', d.baptismDate) + pf('연락처', d.phone) + pf('직장/학교', d.workplace)
    + '<div class="pf-field full">' + pfLabel('신앙 유형') + '<div class="level-group"><button class="level-btn' + (d.faithType==='가족신앙'?' level-on-accent':'') + '">가족신앙</button><button class="level-btn' + (d.faithType==='홀신앙'?' level-on-accent':'') + '">홀신앙</button><button class="level-btn' + (d.faithType==='부분가족신앙'?' level-on-accent':'') + '">부분가족신앙</button></div></div>'
    + '</div></div>'
    // 예배생활
    + '<div class="profile-section"><div class="profile-section-title">⛪ 예배 생활</div>'
    + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">' + pfLabel('예배 수준') + '<div class="level-group"><button class="level-btn' + (d.worshipLevel==='상'?' level-on-green':'') + '">상</button><button class="level-btn' + (d.worshipLevel==='중'?' level-on-orange':'') + '">중</button><button class="level-btn level-btn-하">하</button></div></div>'
    + '</div>'
    // 신앙상태
    + '<div class="profile-section"><div class="profile-section-title">📖 신앙 상태</div>'
    + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">' + pfLabel('신앙 수준') + '<div class="level-group"><button class="level-btn' + (d.faithLevel==='상'?' level-on-green':'') + '">상</button><button class="level-btn' + (d.faithLevel==='중'?' level-on-orange':'') + '">중</button><button class="level-btn">하</button></div></div>'
    + '</div>'
    // 지체관계
    + '<div class="profile-section"><div class="profile-section-title">🔗 지체 관계</div>'
    + '<div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:6px">👥 친분자</div>' + friends
    + '<div style="font-size:.7rem;font-weight:700;color:var(--muted);margin:10px 0 6px">🔗 관계 인물</div>' + rolesHtml
    + '</div>'
    // 인수인계 핵심
    + '<div class="profile-section"><div class="profile-section-title">⚠️ 인수인계 핵심</div><div class="pf-grid">'
    + pfFull('심방 시간·방법', d.visitTime) + pfFull('주의사항', d.caution) + pfFull('기도제목', d.prayer)
    + '</div></div>'
    // 이전 담당자
    + '<div class="profile-section"><div class="profile-section-title">👤 이전 담당자</div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap">' + pf('이름', d.prevLeader) + pf('연락처', d.prevLeaderContact) + '</div>'
    + '</div>'
    + '<div style="height:20px"></div>';

  showScreen('profile');
}

function pf(label, val) {
  return '<div class="pf-field">' + pfLabel(label) + '<div class="pf-val' + (!val?' empty':'') + '">' + (val||'미입력') + '</div></div>';
}
function pfFull(label, val) {
  return '<div class="pf-field full">' + pfLabel(label) + '<div class="pf-val' + (!val?' empty':'') + '">' + (val||'미입력') + '</div></div>';
}
function pfLabel(t) { return '<div class="pf-label">' + t + '</div>'; }
</script>
</body>
</html>
