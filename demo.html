<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>구역 관리 · 체험판</title>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#222536;--bd:#2e3147;--ac:#6c8fff;--ac2:#a78bfa;--tx:#e8eaf6;--mu:#7b82a8;--dg:#f87171;--ok:#4ade80;--mn:#f6a935;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}

.hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.hdr h1{font-size:.92rem;font-weight:600}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.demo-badge{background:rgba(246,169,53,.2);color:var(--mn);border:1px solid rgba(246,169,53,.3);border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:700}
.main-body{flex:1;overflow-y:auto;min-height:0}
.tab-pane{display:none}.tab-pane.active{display:block}
.tab-bar{display:flex;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;border:none;background:transparent;color:var(--mu);font-family:inherit;font-size:.58rem;cursor:pointer;border-top:2px solid transparent}
.tab-btn.active{color:var(--ac);border-top-color:var(--ac)}
.tab-icon{font-size:1.1rem;line-height:1}.tab-label{font-weight:600}

/* 로그인 */
#screen-login{height:100vh;align-items:center;justify-content:center;background:var(--bg);overflow-y:auto}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:32px 24px;text-align:center;width:320px;max-width:92vw;margin:20px}
.role-opt{padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:.83rem;text-align:left;background:var(--sf2);color:var(--tx);transition:all .18s;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.role-opt:hover,.role-opt.sel{border-color:var(--ac);background:rgba(108,143,255,.1);color:var(--ac);font-weight:700}
.role-desc{font-size:.7rem;color:var(--mu);display:block;font-weight:400;margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;width:100%}
.btn-g{background:transparent;border:1px solid var(--bd);color:var(--mu)}
.btn-s{padding:5px 10px;font-size:.75rem;border-radius:6px;border:none;cursor:pointer}

/* 신앙관리 */
.faith-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--sf);flex-wrap:nowrap;position:sticky;top:0;z-index:5}
.faith-title{font-size:.9rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-badge{font-size:.7rem;color:var(--mu);background:var(--sf2);padding:3px 8px;border-radius:5px;border:.5px solid var(--bd);white-space:nowrap;flex-shrink:0}
.table-wrap{overflow-x:auto}
.ft{width:100%;border-collapse:collapse;font-size:.78rem}
.ft th{font-size:.65rem;font-weight:700;padding:5px 4px;border-bottom:.5px solid var(--bd);text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap;background:var(--sf);color:var(--mu)}
.ft th.sh{background:#1a2235;color:#85b7eb}
.fr{border-bottom:.5px solid var(--bd)}.fr:hover{background:rgba(108,143,255,.03)}
.col-n{padding:6px 4px 6px 10px;white-space:nowrap;cursor:pointer;min-width:72px}
.mn{font-weight:600;font-size:.82rem;color:var(--tx);display:block}.mn:hover{color:var(--ac);text-decoration:underline}
.sp-badge{display:block;border-radius:3px;padding:1px 5px;font-size:.56rem;margin-top:1px;white-space:nowrap;border:.5px solid}
.sm{display:block;font-size:.54rem;border-radius:3px;padding:1px 5px;margin-top:2px;white-space:nowrap}
.sm-on{background:rgba(248,113,113,.15);color:#f87171;border:.5px solid rgba(248,113,113,.4)}
.sm-off{background:rgba(120,120,140,.1);color:rgba(120,120,140,.4);border:.5px solid rgba(120,120,140,.2);cursor:pointer}
.wc{text-align:center;padding:5px 2px;cursor:pointer;min-width:40px}.wc:hover{background:rgba(108,143,255,.08)}
.wc-val{font-size:.78rem}.wc-sub{font-size:.52rem;opacity:.75;display:block;margin-top:1px}
.tags-td{padding:3px 5px;min-width:90px;cursor:pointer}.tags-td:hover{background:rgba(108,143,255,.06)}
.badge{display:inline-block;border-radius:4px;padding:1px 5px;font-size:.65rem;margin:1px}
.b-edu{background:rgba(74,222,128,.15);color:var(--ok);border:1px solid rgba(74,222,128,.3)}
.b-svc{background:rgba(246,169,53,.15);color:var(--mn);border:1px solid rgba(246,169,53,.3)}
.b-add{color:rgba(255,255,255,.2);font-size:.8rem;display:block;text-align:center}
.chk{text-align:center;padding:6px 2px;width:30px;cursor:pointer}.chk:hover{background:rgba(108,143,255,.06)}
.chk-a{color:var(--ac);font-weight:700}.chk-m{color:var(--mn)!important}
.dot{color:rgba(255,255,255,.15);font-size:.9rem}
.res-td{text-align:center;padding:3px 4px;white-space:nowrap}
.rb{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:3px 5px;font-size:1.1rem;line-height:1;cursor:pointer;opacity:.3;margin:1px;transition:opacity .15s}
.rb:hover{opacity:.7}.rb.ron{opacity:1}
.goal-td{padding:3px 6px;min-width:120px}
.gi{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--tx);font-family:inherit;font-size:.75rem;padding:3px 2px;outline:none}
.gi:focus{border-bottom-color:var(--ac)}.gi::placeholder{color:rgba(255,255,255,.2)}
.gi-adv{color:#a78bfa!important}.gi-adv::placeholder{color:rgba(167,139,250,.3)!important}
.prev-td{padding:3px 6px;min-width:90px;font-size:.72rem;color:var(--mu)}
.sep{border-right:1px solid rgba(255,255,255,.07)!important}
.hint{padding:5px 14px;font-size:.67rem;color:var(--mu);background:var(--sf);border-top:.5px solid var(--bd)}

/* 도장 */
.fstamp{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:58px;border-radius:8px;border:2.5px solid;flex-shrink:0;padding:3px;user-select:none;transition:all .2s}
.fstamp-on{border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171;transform:rotate(-5deg)}
.fstamp-on .fsi{font-size:.88rem;line-height:1}.fstamp-on .fsn{font-size:.6rem;font-weight:900;letter-spacing:-.02em;margin-top:1px}
.fstamp-on .fsr{font-size:.48rem;color:rgba(248,113,113,.75);letter-spacing:.04em}.fstamp-on .fsd{font-size:.44rem;color:rgba(248,113,113,.6);margin-top:1px}
.fstamp-off{border-color:rgba(120,120,140,.25);color:rgba(120,120,140,.3);cursor:pointer}
.fstamp-off:hover{border-color:rgba(248,113,113,.45);color:rgba(248,113,113,.45);background:rgba(248,113,113,.04)}
.fstamp-off .fsi{font-size:.95rem;line-height:1}.fstamp-off .fsr{font-size:.5rem;margin-top:2px}

/* 팝업 (바텀시트) */
.pop-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-end;justify-content:center}
.pop-bg.show{display:flex}
.pop{background:var(--sf);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.pop-title{font-size:.82rem;font-weight:700;color:var(--mu);margin-bottom:12px;text-align:center;letter-spacing:.04em}
.pop-sec{margin-bottom:12px}
.pop-sec-label{font-size:.68rem;font-weight:700;color:var(--mu);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.pop-row{display:flex;flex-wrap:wrap;gap:6px}
.pop-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:7px 13px;font-family:inherit;font-size:.82rem;color:var(--tx);cursor:pointer;transition:all .15s}
.pop-btn:hover{border-color:var(--ac);background:rgba(108,143,255,.1)}
.pop-on{background:rgba(108,143,255,.2)!important;border-color:var(--ac)!important;color:var(--ac)!important;font-weight:700}
.pop-present-on{background:rgba(74,222,128,.15)!important;border-color:var(--ok)!important;color:var(--ok)!important;font-weight:700}
.pop-zoom-on{background:rgba(108,143,255,.15)!important;border-color:var(--ac)!important;color:var(--ac)!important;font-weight:700}
.pop-excuse-on{background:rgba(246,169,53,.15)!important;border-color:var(--mn)!important;color:var(--mn)!important;font-weight:700}
.pop-absent{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:7px;padding:8px;font-family:inherit;font-size:.82rem;color:var(--dg);cursor:pointer;width:100%;margin-bottom:5px}
.pop-reset{background:transparent;border:1px solid rgba(120,120,140,.2);border-radius:7px;padding:7px;font-family:inherit;font-size:.75rem;color:var(--mu);cursor:pointer;width:100%;margin-bottom:8px}
.pop-close{display:block;width:100%;padding:9px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--mu);font-family:inherit;font-size:.8rem;cursor:pointer}
.pop-check-list{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow-y:auto;margin-bottom:10px}
.pci{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sf2);border-radius:7px;cursor:pointer;border:1px solid transparent}
.pci.on{border-color:var(--ac);background:rgba(108,143,255,.1)}
.pci-box{width:18px;height:18px;border:1.5px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.pci.on .pci-box{background:var(--ac);border-color:var(--ac);color:#fff}

/* 인수인계서 */
#screen-profile{overflow:hidden}
.pf-hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pf-body{flex:1;overflow-y:auto;padding:14px;max-width:700px;width:100%;margin:0 auto}
.pf-sec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.pf-st{font-size:.73rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.pf-grid{grid-template-columns:1fr}}
.pf-f{display:flex;flex-direction:column;gap:4px}.pf-f.full{grid-column:1/-1}
.pf-label{font-size:.7rem;color:var(--mu)}
.pf-inp{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;color:var(--tx);font-family:inherit;font-size:.83rem;outline:none;width:100%}
.pf-inp:focus{border-color:var(--ac)}
.pf-ta{resize:vertical;min-height:56px}

/* 심령단계 — 사진1/3 + 심령2/3 */
.spirit-layout{display:flex;gap:12px;align-items:flex-start}
.photo-col{width:33%;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.photo-box{width:100%;aspect-ratio:1/1;border-radius:10px;border:1.5px dashed var(--bd);background:var(--sf2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.5rem;color:var(--mu);cursor:pointer;overflow:hidden;background-size:cover;background-position:center;transition:border-color .2s}
.photo-box:hover{border-color:var(--ac)}
.photo-hint{font-size:.6rem;color:var(--mu);text-align:center;margin-top:5px}
.spirit-col{flex:1;display:flex;flex-direction:column;gap:5px}
.sp-btn-v{width:100%;text-align:left;border-radius:7px;padding:7px 12px;font-family:inherit;font-size:.8rem;border:.5px solid;cursor:pointer;opacity:.28;font-weight:500;transition:all .18s}
.sp-btn-v.on{opacity:1;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* 레벨 버튼 */
.lv-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.lv{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 12px;font-size:.78rem;color:var(--mu);cursor:pointer;transition:all .15s}
.lv.on{font-weight:700}
.lv-g{background:rgba(74,222,128,.15)!important;color:var(--ok)!important;border-color:var(--ok)!important}
.lv-o{background:rgba(246,169,53,.15)!important;color:var(--mn)!important;border-color:var(--mn)!important}
.lv-r{background:rgba(248,113,113,.15)!important;color:var(--dg)!important;border-color:var(--dg)!important}
.lv-a{background:rgba(108,143,255,.15)!important;color:var(--ac)!important;border-color:var(--ac)!important}

/* 도장 (상세카드) */
.pf-stamp{display:flex;flex-direction:column;align-items:center;justify-content:center;width:62px;height:66px;border-radius:8px;border:2.5px solid #f87171;background:rgba(248,113,113,.07);color:#f87171;transform:rotate(-5deg);padding:4px;flex-shrink:0;user-select:none}
.pf-stamp .si{font-size:.95rem;line-height:1}.pf-stamp .sn{font-size:.62rem;font-weight:900;margin-top:1px}
.pf-stamp .sr{font-size:.5rem;color:rgba(248,113,113,.75);letter-spacing:.04em}.pf-stamp .sd{font-size:.46rem;color:rgba(248,113,113,.6);margin-top:1px}

/* 관계 */
.rel-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.rel-label{font-size:.7rem;font-weight:700;color:var(--ac2);width:40px;flex-shrink:0;padding-top:7px;text-align:right}
.rel-fields{display:flex;flex:1;gap:5px;flex-wrap:wrap}
.rel-inp{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 7px;color:var(--tx);font-family:inherit;font-size:.75rem;outline:none;flex:1;min-width:60px}
.rel-inp:focus{border-color:var(--ac)}
.friend-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;align-items:center}

/* 빈 상태 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;color:var(--mu);text-align:center;padding:20px;font-size:.85rem;line-height:1.9}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="screen active" id="screen-login">
<div style="flex:1;display:flex;align-items:center;justify-content:center">
<div class="login-box">
  <div style="font-size:2.5rem;margin-bottom:12px">⛪</div>
  <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:6px">구역 관리</h2>
  <p style="color:var(--mu);font-size:.78rem;margin-bottom:18px;line-height:1.7">역할을 선택하고 체험해보세요</p>
  <div id="role-list">
    <div class="role-opt sel" onclick="selectRole(this,'leader')" data-role="leader">
      <span style="font-size:1.3rem">👤</span>
      <div><span>구역장</span><span class="role-desc">예배·헌금·목표 기록, 상세카드 편집</span></div>
    </div>
    <div class="role-opt" onclick="selectRole(this,'region')" data-role="region">
      <span style="font-size:1.3rem">👑</span>
      <div><span>임원 (고현정)</span><span class="role-desc">임원 조언 + 확인 도장 기능 체험</span></div>
    </div>
  </div>
  <button class="btn btn-p" style="margin-top:4px" onclick="enterDemo()">체험 시작 →</button>
  <p style="font-size:.63rem;color:var(--mu);margin-top:10px">Firebase 연결 없이 샘플 데이터로 체험합니다</p>
</div>
</div>
</div>

<!-- 메인 -->
<div class="screen" id="screen-main">
  <div class="hdr">
    <div class="logo">⛪</div>
    <h1>구역 관리</h1>
    <div class="hdr-r">
      <span class="demo-badge">체험판</span>
      <span id="role-tag" style="font-size:.72rem;color:var(--mu)"></span>
    </div>
  </div>
  <div class="main-body">
    <div class="tab-pane active" id="tab-faith"></div>
    <div class="tab-pane" id="tab-evang"><div class="empty-state"><div style="font-size:2.5rem">🌱</div><p>전도 현황<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-visit"><div class="empty-state"><div style="font-size:2.5rem">🫂</div><p>심방 현황<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-stats"><div class="empty-state"><div style="font-size:2.5rem">📊</div><p>통계<br>다음 버전 예정</p></div></div>
    <div class="tab-pane" id="tab-settings">
      <div style="padding:20px;max-width:480px;margin:0 auto">
        <div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px">
          <div style="padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center"><span>🔑</span><span style="flex:1;font-size:.88rem">멤버·승인 관리</span><span style="color:var(--mu)">›</span></div>
          <div style="padding:13px 16px;display:flex;gap:10px;align-items:center"><span>📦</span><span style="flex:1;font-size:.88rem">구역원 이관 승인</span><span style="color:var(--mu)">›</span></div>
        </div>
        <button onclick="goLogin()" style="display:block;width:100%;padding:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-family:inherit;cursor:pointer;font-size:.83rem">← 역할 바꾸기</button>
        <div style="text-align:center;color:var(--mu);font-size:.68rem;padding:10px">구역 관리 v3.2 · 체험판</div>
      </div>
    </div>
  </div>
  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(this,'faith')"><span class="tab-icon">📋</span><span class="tab-label">구역 신앙</span></button>
    <button class="tab-btn" onclick="switchTab(this,'evang')"><span class="tab-icon">🌱</span><span class="tab-label">전도</span></button>
    <button class="tab-btn" onclick="switchTab(this,'visit')"><span class="tab-icon">🫂</span><span class="tab-label">심방</span></button>
    <button class="tab-btn" onclick="switchTab(this,'stats')"><span class="tab-icon">📊</span><span class="tab-label">통계</span></button>
    <button class="tab-btn" onclick="switchTab(this,'settings')"><span class="tab-icon">⚙️</span><span class="tab-label">설정</span></button>
  </nav>
</div>

<!-- 상세카드 -->
<div class="screen" id="screen-profile">
  <div class="pf-hdr">
    <button class="btn btn-g btn-s" onclick="closeProfile()">← 돌아가기</button>
    <span id="pf-name" style="font-size:.95rem;font-weight:600;flex:1;text-align:center"></span>
    <button onclick="saveProfile()" style="background:var(--ac);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer">저장</button>
  </div>
  <div class="pf-body" id="pf-body"></div>
</div>

<!-- 예배 팝업 (원본 구조 동일) -->
<div class="pop-bg" id="pop-worship">
  <div class="pop">
    <div class="pop-title" id="pop-w-title">예배 기록</div>
    <div class="pop-sec">
      <div class="pop-sec-label">당일출석</div>
      <div class="pop-row" id="pop-present"></div>
    </div>
    <div class="pop-sec">
      <div class="pop-sec-label">줌</div>
      <div class="pop-row" id="pop-zoom"></div>
    </div>
    <div class="pop-sec">
      <div class="pop-sec-label">사유출석</div>
      <div class="pop-row" id="pop-excuse"></div>
    </div>
    <button class="pop-absent" onclick="setWorship('absent',null,null)">✗ 미출석</button>
    <button class="pop-reset" onclick="setWorship(null,null,null)">↩ 초기화 (미기록)</button>

function wCell(v) {
  if (!v || !v.type) return '<span style="color:rgba(255,255,255,.18)">—</span>';

  const cfg = map[v.type]||{c:'var(--mu)',s:'?'};
  const sub = v.time||v.excuseType||'';
  return '<span class="wc-val" style="color:'+cfg.c+'">'+cfg.s+'</span>'
    +(sub?'<span class="wc-sub" style="color:'+cfg.c+'">'+sub+'</span>':'');

// ── 이벤트 ──
function doRegionStamp() {
  if(!confirm('고현정 임원으로 이번 주 신앙관리를 확인하시겠어요?')) return;
  regionStamped=true; renderFaith();
}
function stampMember(mid) {
  const m=MEMBERS.find(x=>x.mid===mid); if(!m||m.stampDone) return;
  if(!confirm(m.name+'의 인수인계서를 확인하시겠어요?')) return;
  m.stampDone=true; renderFaith();
}
function toggleChk(mid,f) { const m=MEMBERS.find(x=>x.mid===mid); if(!m) return; m[f]=!m[f]; renderFaith(); }
function toggleResult(mid,r) { const m=MEMBERS.find(x=>x.mid===mid); if(!m) return; m.prevResult=m.prevResult===r?null:r; renderFaith(); }
function setGoal(mid,val,t) { const m=MEMBERS.find(x=>x.mid===mid); if(!m) return; if(t==='g') m.goal=val; else m.leaderNote=val; }

// ── 예배 팝업 (원본과 동일 섹션 구조) ──
let _wCtx={};
function openWPop(mid,wtype) {
  _wCtx={mid,wtype};
  const m=MEMBERS.find(x=>x.mid===mid)||{};
  const cur=m.worship[wtype]||{};
  const times=wtype==='samil'?SAMIL_TIMES:JUIL_TIMES;
  document.getElementById('pop-w-title').textContent=wtype==='samil'?'삼일예배':'주일예배';

  function btn(type, time, excuseType, label) {
    let on='';
    if(type==='present' && cur.type==='present' && cur.time===time) on=' pop-present-on';
    if(type==='zoom'    && cur.type==='zoom'    && cur.time===time) on=' pop-zoom-on';
    if(type==='excuse'  && cur.type==='excuse'  && cur.excuseType===excuseType) on=' pop-excuse-on';
    return '<button class="pop-btn'+on+'" onclick="setWorship(\''+type+'\',\''+time+'\',\''+excuseType+'\')">'+label+'</button>';
  }
  document.getElementById('pop-present').innerHTML=times.map(t=>btn('present',t,null,t)).join('');
  document.getElementById('pop-zoom').innerHTML=[...times.filter(t=>t!=='당일방문'),ZOOM_EXTRA].map(t=>btn('zoom',t,null,t)).join('');
  document.getElementById('pop-excuse').innerHTML=EXCUSE.map(t=>btn('excuse',null,t,t)).join('');
  document.getElementById('pop-worship').classList.add('show');
}
function setWorship(type,time,excuse) {
  const m=MEMBERS.find(x=>x.mid===_wCtx.mid); if(!m) return;
  if(!type) m.worship[_wCtx.wtype]=null;
  else m.worship[_wCtx.wtype]={type, time:time||null, excuseType:excuse||null};
  closePop('pop-worship'); renderFaith();
}

// ── 태그 팝업 ──
let _tCtx={};
function openTagsPop(mid,dtype) {
  _tCtx={mid,dtype};
  const m=MEMBERS.find(x=>x.mid===mid)||{};
  const list=dtype==='edu'?GLOBAL_EDU:GLOBAL_SVC;
  const cur=dtype==='edu'?m.edu:m.svc;
  document.getElementById('pop-t-title').textContent=dtype==='edu'?'받은 교육 선택':'모임·봉사 선택';
  document.getElementById('pop-t-list').innerHTML=list.map(item=>{
    const on=cur.includes(item);
    return '<div class="pci'+(on?' on':'')+'" onclick="toggleTag(this,\''+item+'\')">'
      +'<div class="pci-box">'+(on?'✓':'')+'</div>'
      +'<span style="font-size:.83rem">'+item+'</span></div>';
  }).join('');
  document.getElementById('pop-tags').classList.add('show');
}
function toggleTag(el,item) {
  const m=MEMBERS.find(x=>x.mid===_tCtx.mid); if(!m) return;
  const arr=_tCtx.dtype==='edu'?m.edu:m.svc;
  const idx=arr.indexOf(item);
  if(idx>=0) arr.splice(idx,1); else arr.push(item);
  el.classList.toggle('on',arr.includes(item));
  el.querySelector('.pci-box').textContent=arr.includes(item)?'✓':'';
}

function closePop(id) { document.getElementById(id).classList.remove('show'); }

    +'<div id="ft-note-wrap" style="margin-top:8px;display:'+(showFtNote?'block':'none')+'">'

    +'</div></div>'
    +'</div></div>'
    // ③ 예배생활
    +'<div class="pf-sec"><div class="pf-st">⛪ 예배 생활</div>'
    +'<div class="pf-f" style="margin-bottom:10px"><div class="pf-label">예배 수준</div><div class="lv-row" id="wl-row">'
    +['상','중','하'].map((v,i)=>'<button class="lv'+(d.worshipLevel===v?' on lv-'+(i===0?'g':i===1?'o':'r'):'')+'" onclick="setLv(this,\'worshipLevel\',\''+v+'\','+(i===0?'\'g\'':i===1?'\'o\'':'\'r\'')+',\'wl-row\')">'+v+'</button>').join('')
    +'</div></div>'
    +ta('예배 특이사항','pf-wnote',d.worshipLevelNote)
    +'</div>'
    // ④ 신앙상태
    +'<div class="pf-sec"><div class="pf-st">📖 신앙 상태</div>'
    +'<div class="pf-f" style="margin-bottom:10px"><div class="pf-label">신앙 수준</div><div class="lv-row" id="fl-row">'
    +['상','중','하'].map((v,i)=>'<button class="lv'+(d.faithLevel===v?' on lv-'+(i===0?'g':i===1?'o':'r'):'')+'" onclick="setLv(this,\'faithLevel\',\''+v+'\','+(i===0?'\'g\'':i===1?'\'o\'':'\'r\'')+',\'fl-row\')">'+v+'</button>').join('')
    +'</div></div>'
    +ta('기도제목','pf-prayer',d.prayer)
    +'</div>'
    // ⑤ 지체관계
    +'<div class="pf-sec"><div class="pf-st">🔗 지체 관계</div>'
    +'<div style="font-size:.7rem;font-weight:700;color:var(--mu);margin-bottom:6px">👥 친분자</div>'
    +'<div id="friends-wrap">'+friends+'</div>'
    +'<button onclick="addFriend()" style="background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 12px;font-size:.75rem;color:var(--ac);cursor:pointer;margin-bottom:12px">＋ 친분자 추가</button>'
    +'<div style="font-size:.7rem;font-weight:700;color:var(--mu);margin-bottom:6px">🔗 관계 인물</div>'
    +rolesHtml+'</div>'
    // ⑥ 인수인계 핵심
    +'<div class="pf-sec"><div class="pf-st">⚠️ 인수인계 핵심</div>'
    +ta('심방 시간·방법','pf-vt',d.visitTime)
    +ta('주의사항','pf-caution',d.caution)
    +ta('기도제목','pf-prayer2',d.prayer)
    +'</div>'
    // ⑦ 이전 담당자
    +'<div class="pf-sec"><div class="pf-st">👤 이전 담당자</div><div class="pf-grid">'
    +fi('이름','pf-pl',d.prevLeader)+fi('연락처','pf-plc',d.prevLeaderContact)
    +'</div></div>'
    +'<div style="height:20px"></div>';

  showScreen('profile');
}

// 사진 업로드
function uploadPhoto(input) {
  if(!input.files?.[0]) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const M=240; let w=img.width,h=img.height;
      if(w>h){if(w>M){h=h*M/w;w=M;}}else{if(h>M){w=w*M/h;h=M;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      const b64=c.toDataURL('image/jpeg',.8);
      const box=document.getElementById('photo-box');
      if(box){box.style.backgroundImage='url('+b64+')';box.innerHTML='';}
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(input.files[0]);
}

// 신앙유형
function setFaithType(val) {
  const d=DETAIL[_curMid]; if(d) d.faithType=val;
  document.querySelectorAll('#ft-row .lv').forEach(b=>{b.classList.remove('on','lv-a');});
  event.currentTarget.classList.add('on','lv-a');
  document.getElementById('ft-note-wrap').style.display = val==='부분가족신앙'?'block':'none';
}
function setLv(btn,field,val,cls,rowId) {
  document.querySelectorAll('#'+rowId+' .lv').forEach(b=>{b.classList.remove('on','lv-g','lv-o','lv-r','lv-a');});
  btn.classList.add('on','lv-'+cls);
  const d=DETAIL[_curMid]; if(d) d[field]=val;
}
function setSpirit(key) {
  const m=MEMBERS.find(x=>x.mid===_curMid); if(m) m.spiritLevel=key;
  document.querySelectorAll('.sp-btn-v').forEach(b=>b.classList.remove('on'));
  event.currentTarget.classList.add('on');
}
function addFriend() {
  const d=DETAIL[_curMid]; if(!d) return;
  if(!d.relFriends) d.relFriends=[];
  d.relFriends.push({이름:'',연락처:'',소속:'',관계:''});
  openProfile(_curMid);
}
function delFriend(i) {
  const d=DETAIL[_curMid]; if(!d||!d.relFriends) return;
  d.relFriends.splice(i,1); openProfile(_curMid);
}
function saveProfile() {
  alert('✅ 저장됐어요!\n(체험판은 새로고침 시 초기화됩니다)');
  showScreen('main'); renderFaith();
}
function closeProfile() { showScreen('main'); }

// 헬퍼
function fi(label,id,val){return'<div class="pf-f"><div class="pf-label">'+label+'</div><input class="pf-inp" id="'+id+'" value="'+e(val||'')+'" placeholder="'+label+'"></div>';}
function ta(label,id,val){return'<div class="pf-f full"><div class="pf-label">'+label+'</div><textarea class="pf-inp pf-ta" id="'+id+'">'+e(val||'')+'</textarea></div>';}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
